services:
  database:
    ports:
      - "5432:5432"

  admin:
    image: dpage/pgadmin4:latest
    container_name: admin
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: 1
    ports:
      - "5050:80"
    depends_on:
      - database
    networks:
      - local-network
