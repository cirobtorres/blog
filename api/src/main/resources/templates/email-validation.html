<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="color-scheme" content="light dark">
        <meta name="supported-color-schemes" content="light dark">
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: sans-serif;
            }

            .body-wrapper {
                color: #000 !important;
                background-color: #fff;
            }

            .body-wrapper * {
                margin-bottom: 24px;
            }

            user {
                font-weight: bold;
            }

            .code-item {
                font-size: 24px;
                color: #8e51ff;
                font-family: monospace;
                font-weight: bold;
            }

            .code-wrapper .code-item:not(first-child) {
                margin-right: 8px
            }
        </style>
        <title>Confirmação de E-mail</title>
    </head>
    <body class="body-wrapper">
        <h2 class="heading">Seu código de validação de email!</h2>

        <div class="text-wrapper">
            <p>Olá, <span th:text="${name}" class="user">Usuário</span>! Muito obrigado pelo seu cadastro.</p>
            <p>Aqui está o seu código de validação. Este código é válido por apenas 1 hora.</p>
        </div>

        <div class="code-wrapper">
            <span th:each="digit : ${code}" th:text="${digit}" class="code-item"></span>
        </div>

        <small>Este é um e-mail automático.</small>
    </body>
</html>
