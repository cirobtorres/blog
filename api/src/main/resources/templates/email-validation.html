<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="color-scheme" content="light dark">
        <meta name="supported-color-schemes" content="light dark">
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                width: 100% !important;
                font-family: sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                min-height: 100vh;
            }

            .body-wrapper {
                color: #000 !important;
                background-color: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .body-card {
                max-width: 800px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 20px;
                padding: 40px 32px;
                border: 1px solid #e5e5e5;
                border-radius: 20px;
                background-color: #f5f5f5;
                box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
            }

            .heading {
                text-align: center;
                margin-bottom: 20px;
            }

            span.user {
                font-weight: bold;
            }

            .body-card small {
                color: #a1a1a1 !important;
                font-weight: 700;
            }

            .text-wrapper {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }

            .code-wrapper {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 2px;
            }

            .code-item {
                width: 30px;
                padding: 8px 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 24px;
                color: #8e51ff;
                background-color: #e5e5e5;
            }

            .body-card, .code-item {
                border: 1px solid #d4d4d4;
            }

            .code-svg {
                stroke: #737373;
            }

            .code-item-l {
                border-radius: 8px 0 0 8px;
            }

            .code-item-r {
                border-radius: 0 8px 8px 0;
            }

            .user {
                color: #09090b;
            }

            @media (prefers-color-scheme: dark) {
                .body-wrapper {
                    color: #fff !important;
                    background-color: black !important;
                }

                .body-card .text-wrapper p, .body-card small {
                    color: #737373;
                }

                .body-card {
                    border: 1px solid #ffffff1a;
                    background-color: #09090b;
                }

                .body-card, .code-item {
                    border: 1px solid #ffffff1a;
                }

                .code-item {
                    background-color: #ffffff1a;
                }

                .user {
                    color: #fafafa;
                }
            }
        </style>
        <title>Confirmação de E-mail</title>
    </head>
    <body class="body-wrapper">
        <div class="body-card">
            <h2 class="heading">Código de validação</h2>

            <div class="text-wrapper">
                <p>Ei, <span th:text="${name}" class="user">Usuário</span>! Aqui está o seu código de validação.</p>
                <p>Este código é válido por apenas 1 hora.</p>
            </div>

            <div class="code-wrapper">
                <span th:text="${code[0]}" class="code-item code-item-l">M</span>
                <span th:text="${code[1]}" class="code-item code-item-mid">I</span>
                <span th:text="${code[2]}" class="code-item code-item-mid">7</span>
                <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="code-svg"
                >
                    <path d="M5 12h14"/>
                </svg>
                <span th:text="${code[3]}" class="code-item code-item-mid">Z</span>
                <span th:text="${code[4]}" class="code-item code-item-mid">7</span>
                <span th:text="${code[5]}" class="code-item code-item-r">H</span>
            </div>

            <small>Este é um e-mail automático.</small>
        </div>
    </body>
</html>
