services:
  # nginx:
  #   image: nginx:alpine
  #   container_name: nginx
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/certs:ro
  #   depends_on:
  #     - web
  #     - api
  #     - admin
  #   networks:
  #     - local-network

  api:
    build: ./api
    container_name: api
    expose:
      - "8080"
    environment:
      - API_PROPERTIES_JWT_PRIVATE_KEY_PATH=/keys/jwt-private.pem
      - API_PROPERTIES_JWT_PUBLIC_KEY_PATH=/keys/jwt-public.pem
      - PROFILE_ACTIVE=${PROFILE_ACTIVE}
      - POSTGRES_HOST=database
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /keys:/keys:ro
    depends_on:
      - database
    networks:
      - local-network

  web:
    build:
      context: ./web
      args:
        - WEB_URL=${WEB_URL}
        - API_URL=${API_URL}
        - API_URL_SERVER=${API_URL_SERVER}
    container_name: web
    expose:
      - "3000"
    networks:
      - local-network

  database:
    image: postgres:17-alpine
    container_name: database
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - local-network

  # admin:
  #   image: dpage/pgadmin4:latest
  #   container_name: admin
  #   environment:
  #     - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
  #     - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
  #     - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=False
  #     - PGADMIN_LISTEN_PORT=80
  #   ports:
  #     - "80"
  #   depends_on:
  #     - database
  #   networks:
  #     - local-network

networks:
  local-network:
    driver: bridge

volumes:
  pgdata:
